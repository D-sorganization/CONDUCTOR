<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maxwell-Daemon Desktop</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <h1>Maxwell-Daemon</h1>
    <button id="command-button">Command</button>
  </header>
  <main>
    <section class="status-strip" id="status-strip">
      <span id="connection-state">connecting</span>
      <span id="resource-state">0 tasks, 0 repos</span>
      <span id="updated-state">not synced</span>
    </section>
    <section class="toolbar">
      <input id="daemon-url" type="url" placeholder="http://127.0.0.1:8080">
      <input id="token" type="password" placeholder="Bearer token">
      <button id="save-settings">Save</button>
      <button id="refresh">Refresh</button>
      <button id="updates">Check Updates</button>
      <button id="install-update" hidden>Install Update</button>
      <span id="update-state">updates not checked</span>
    </section>
    <section class="drop-zone" id="drop-zone">Drop files here to attach them to a new issue</section>
    <ul class="drop-list" id="drop-list"></ul>
    <section class="grid">
      <article>
        <h2>Fleet</h2>
        <ul id="fleet"></ul>
      </article>
      <article>
        <h2>Tasks</h2>
        <ul id="tasks"></ul>
      </article>
      <article>
        <h2>Dispatch Issue</h2>
        <input id="issue-ref" placeholder="D-sorganization/Maxwell-Daemon#13">
        <select id="issue-mode">
          <option value="implement">implement</option>
          <option value="plan">plan</option>
        </select>
        <button id="dispatch">Dispatch</button>
      </article>
      <article>
        <h2>Create Issue</h2>
        <input id="create-repo" placeholder="D-sorganization/Maxwell-Daemon">
        <input id="create-title" placeholder="Issue title">
        <textarea id="create-body" placeholder="Describe the request"></textarea>
        <select id="create-mode">
          <option value="plan">plan</option>
          <option value="implement">implement</option>
        </select>
        <label class="checkbox-row">
          <input id="create-dispatch" type="checkbox">
          Dispatch after create
        </label>
        <button id="create-issue">Create Issue</button>
        <p id="create-status" aria-live="polite"></p>
      </article>
    </section>
  </main>
  <dialog id="command-palette">
    <form method="dialog" id="command-form">
      <input id="command-input" placeholder="refresh, dispatch, updates">
      <menu class="command-list">
        <button type="button" data-command="refresh">Refresh</button>
        <button type="button" data-command="dispatch">Dispatch</button>
        <button type="button" data-command="updates">Updates</button>
      </menu>
      <p id="command-status" aria-live="polite"></p>
      <button value="cancel">Close</button>
    </form>
  </dialog>
  <script src="./app.js"></script>
</body>
</html>
