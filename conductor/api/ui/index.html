<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CONDUCTOR — Agent Fleet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/ui/style.css">
</head>
<body>
  <header>
    <h1>CONDUCTOR</h1>
    <div class="toolbar">
      <span id="connection" class="pill">connecting…</span>
      <span id="cost-summary" class="pill"></span>
    </div>
  </header>

  <main>
    <section class="card" id="tasks-card">
      <div class="card-head">
        <h2>Tasks</h2>
        <div class="filters">
          <select id="status-filter">
            <option value="">all</option>
            <option value="queued">queued</option>
            <option value="running">running</option>
            <option value="completed">completed</option>
            <option value="failed">failed</option>
            <option value="cancelled">cancelled</option>
          </select>
          <button id="refresh-btn">refresh</button>
        </div>
      </div>
      <table id="tasks-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Kind</th>
            <th>Status</th>
            <th>Target</th>
            <th>Cost</th>
            <th>PR</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tasks-body"></tbody>
      </table>
    </section>

    <section class="card" id="detail-card" hidden>
      <div class="card-head">
        <h2 id="detail-title">Task detail</h2>
        <button id="detail-close">×</button>
      </div>
      <dl id="detail-fields"></dl>
      <h3>Output</h3>
      <pre id="detail-output"></pre>
    </section>

    <section class="card" id="backends-card">
      <div class="card-head">
        <h2>Backends</h2>
      </div>
      <ul id="backends-list"></ul>
    </section>
  </main>

  <footer>
    <span>Docs: <a href="https://github.com/D-sorganization/CONDUCTOR">repository</a></span>
  </footer>

  <script src="/ui/app.js"></script>
</body>
</html>
